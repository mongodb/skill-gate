pack: core
version: 0.1.0

# Generic, domain-agnostic skill-safety rules. These cover the security
# checklist criteria that apply to any agent-skills repository regardless of the
# data platform: handling secrets, destroying the local environment, and calling
# out to external services. Anything that presupposes a database — writing
# "outside the database target", dropping collections — lives in the
# mongodb pack, not here.
#
# This pack holds both static_regex rules (stage 1) and llm_judge rules (stage 2,
# below the static rules).
#
# Every static pattern carries a confidence in (0, 1]. That confidence feeds the
# per-tier confidence floor (--min-confidence): a static match below the floor for
# its tier is downgraded (ESCALATE -> WARN) or dropped (WARN), and it breaks ties
# when several patterns hit one line. It never changes the rule's declared
# severity — that is fixed by the checklist criterion the rule encodes. The floor
# applies to static rules only; llm_judge confidence is the model's uncalibrated
# self-report and does not gate a tier.
rules:
  # Criterion 1 (ESCALATE): instructs the agent to log, store, or transmit
  # connection strings, credentials, or authentication tokens.
  - id: CORE-001
    description: Instructs the agent to mishandle live credentials at runtime (log, store, or transmit secrets, tokens, or connection strings)
    type: static_regex
    severity: ESCALATE
    criterion: 1
    suppress_in_doc_examples: true
    remediation: >-
      Never instruct the agent to persist or transmit secrets. Read credentials
      from the environment or a secrets manager at point of use and keep them
      out of logs, files, and outbound requests.
    patterns:
      - pattern: '(?i)\b(?:log|logging|store|stores|storing|save|saves|saving|print|prints|echo|write|writes|persist|cache|record|expose|transmit|send)\b[^.\n]{0,40}\b(?:password|passwd|secret|secrets|api[ _-]?keys?|access[ _-]?tokens?|auth(?:entication)?[ _-]?tokens?|bearer\s+tokens?|credentials?|connection\s+strings?)\b'
        confidence: 0.8
      - pattern: '(?i)\b(?:password|api[ _-]?keys?|access[ _-]?tokens?|credentials?|connection\s+strings?)\b[^.\n]{0,30}\bto\s+(?:the\s+|a\s+|an\s+)?(?:std(?:out|err)|console|logs?|a\s+log|a\s+file|disk|the\s+filesystem)\b'
        confidence: 0.65

  # Criterion 8 (ESCALATE): could cause the agent to take irreversible
  # destructive actions without explicit confirmation. This rule covers the
  # platform-agnostic forms — wiping the filesystem and "delete everything"
  # phrasing. Destructive *database* operations (drop a collection) are
  # MongoDB-shaped and live in the mongodb pack. SQL statements (DROP TABLE) are
  # out of scope for the shipped packs.
  - id: CORE-002
    description: Recommends irreversible destructive actions (rm -rf, deleting everything) without a confirmation guard
    type: static_regex
    severity: ESCALATE
    criterion: 8
    suppress_in_doc_examples: true
    remediation: >-
      Require an explicit confirmation step before any irreversible operation,
      and scope destructive commands to a named target rather than "all" or the
      whole filesystem.
    patterns:
      - pattern: '(?i)\brm\s+-[a-z]*r[a-z]*f'
        confidence: 0.75
      - pattern: '(?i)\b(?:delete|drop|purge|destroy|wipe|erase)\b[^.\n]{0,20}\b(?:all|everything|every\s+\w+|the\s+entire)\b'
        confidence: 0.6

  # Criterion 9 (ESCALATE): instructs the agent to call external URLs,
  # webhooks, or third-party services.
  - id: CORE-003
    description: Instructs the agent to send data to external URLs, webhooks, or third-party services
    type: static_regex
    severity: ESCALATE
    criterion: 9
    suppress_in_doc_examples: true
    remediation: >-
      Remove instructions that send data to external endpoints. If an outbound
      call is essential, document the endpoint's trust model and exactly what
      data is transmitted so it can be reviewed.
    patterns:
      - pattern: '(?i)\b(?:post|posts|posting|send|sends|sending|upload|uploads|uploading|transmit|forward|forwards|exfiltrate|curl|wget)\b[^.\n]{0,40}\bhttps?://'
        confidence: 0.65
      # Require a send/trigger verb adjacent to "webhook" (on either side) so
      # neutral mentions ("configure a webhook URL in settings") don't fire, while
      # "post to a webhook" and "a webhook to notify the channel" still do.
      - pattern: '(?i)(?:\b(?:post|posts|posting|send|sends|sending|trigger|triggers|triggering|call|calls|calling|notify|notifies|notifying|hit|hits|fire|fires|firing|deliver|delivers|push|pushes|forward|forwards)\b[^.\n]{0,30}\bwebhooks?\b|\bwebhooks?\b[^.\n]{0,30}\b(?:to\s+)?(?:post|posts|posting|send|sends|sending|notify|notifies|notifying|trigger|triggers|triggering|call|calls|calling|deliver|delivers|push|pushes|forward|forwards)\b)'
        confidence: 0.5
      - pattern: '(?i)\b(?:call|calls|calling|invoke|invokes|request)\b[^.\n]{0,30}\b(?:external|third[ -]party|remote)\b[^.\n]{0,20}\b(?:url|endpoint|api|service|server)\b'
        confidence: 0.55

  # Criterion 10 (WARN): example code with hardcoded secrets, placeholder
  # credentials, or sample connection strings.
  - id: CORE-004
    description: Embeds a literal secret value in example content (hardcoded key, token, or sample credential)
    type: static_regex
    severity: WARN
    criterion: 10
    suppress_in_doc_examples: true
    remediation: >-
      Replace literal secrets with a clearly fake placeholder (for example
      <your-api-key> or YOUR_TOKEN_HERE) so no real-looking credential ships in
      the skill's examples.
    patterns:
      - pattern: 'AKIA[0-9A-Z]{16}'
        confidence: 0.9
      - pattern: '-----BEGIN (?:RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----'
        confidence: 0.95
      - pattern: '(?i)\b(?:password|passwd|pwd|secret|api[ _-]?key|access[ _-]?key|token|client[ _-]?secret)\b\s*[:=]\s*["\x27]?[A-Za-z0-9+/=_\-]{8,}["\x27]?'
        confidence: 0.6
      - pattern: '(?i)\bBearer\s+[A-Za-z0-9\-._~+/]{12,}=*'
        confidence: 0.7

  # ---------------------------------------------------------------------------
  # Stage 2: LLM-as-judge rules. These cover checklist criteria whose risk is
  # semantic — there is no reliable lexical signature, so a rubric-driven judge
  # evaluates the prose. Each carries a rubric, optional "do not flag if"
  # exclusions, and a schema_ref to the structured finding contract. Severity is
  # fixed by the criterion, exactly as for static rules.
  # ---------------------------------------------------------------------------

  # Criterion 2 (ESCALATE): queries/commands built from user-supplied input
  # without sanitization guidance.
  - id: CORE-005
    description: Builds queries or commands from user-supplied input without sanitization guidance
    type: llm_judge
    severity: ESCALATE
    criterion: 2
    schema_ref: schemas/llm-finding.json
    remediation: >-
      Tell the agent to parameterize or validate user input before it reaches a
      query, shell command, or API call. Never interpolate untrusted input into
      a command string without explicit sanitization guidance.
    rubric: >-
      Determine whether the skill instructs the agent to build, run, or template
      a query, shell command, or API call from user-supplied or otherwise
      untrusted input WITHOUT explicit guidance to parameterize, escape,
      validate, or otherwise sanitize that input first. Fire only when untrusted
      input flows into a query or command and the skill gives no sanitization or
      parameterization guidance.
    exclusions:
      - the skill explicitly tells the agent to parameterize, escape, validate, or sanitize the input before using it
      - the input is hardcoded or developer-controlled rather than user-supplied or untrusted
      - the content only warns against unsafe input handling rather than instructing it

  # Criterion 4 (ESCALATE): PII / sensitive / regulated data handled without
  # explicit handling guidance.
  - id: CORE-006
    description: Handles PII, sensitive, or regulated data without explicit handling guidance
    type: llm_judge
    severity: ESCALATE
    criterion: 4
    schema_ref: schemas/llm-finding.json
    remediation: >-
      Add explicit handling guidance for sensitive data: minimize what is
      collected, state how it is protected (encryption, access control,
      retention), and call out any compliance obligations before the agent
      stores or transmits it.
    rubric: >-
      Determine whether the skill encourages collecting, storing, logging, or
      transmitting PII, sensitive personal data, or regulated data (health,
      financial, or end-user credentials) WITHOUT explicit guidance on handling
      it safely — data minimization, encryption, retention limits, access
      control, or legal basis. Fire when such data handling is directed without
      any protective guidance.
    exclusions:
      - the skill provides explicit handling guidance such as encryption, minimization, retention limits, access control, or compliance requirements
      - no PII, sensitive, or regulated data is involved
      - the content only cautions against mishandling such data

  # Criterion 11 (WARN): scope ambiguous enough to be applied to unintended
  # contexts.
  - id: CORE-007
    description: Skill scope is ambiguous enough to be applied to unintended contexts
    type: llm_judge
    severity: WARN
    criterion: 11
    schema_ref: schemas/llm-finding.json
    remediation: >-
      Tighten the scope language: state the intended environment, target, and
      task boundaries so an agent cannot reasonably apply the guidance to
      production, to the wrong system, or beyond its purpose.
    rubric: >-
      Determine whether the skill's scope is ambiguous enough that an agent could
      reasonably apply its guidance to unintended contexts, environments, or
      databases. Fire when the skill does not make clear where and when it
      applies and a reasonable agent could over-apply it — for example to a
      production system, to the wrong database, or beyond its stated task.
    exclusions:
      - the skill clearly bounds its scope (target environment, system, database, or task) so an agent would not over-apply it

  # Criterion 12 (WARN): no guardrails, caveats, or non-application conditions.
  - id: CORE-008
    description: Skill specifies no guardrails, caveats, or conditions under which the guidance should not be applied
    type: llm_judge
    severity: WARN
    criterion: 12
    schema_ref: schemas/llm-finding.json
    remediation: >-
      Add guardrails: state preconditions, caveats, and the conditions under
      which the guidance should NOT be applied, so an agent knows when to stop
      or ask rather than proceeding unconditionally.
    rubric: >-
      Determine whether the skill specifies any guardrails, caveats,
      preconditions, or conditions under which its guidance should NOT be
      applied. Fire when the skill prescribes operational actions but states no
      guardrails, caveats, or non-application conditions at all.
    exclusions:
      - the skill includes guardrails, caveats, preconditions, or explicit conditions under which the guidance should not be applied
      - the skill is purely informational and prescribes no actions that would need guardrails
